        <!-- CRITICAL: Clear God Mode localStorage if no user - runs BEFORE React -->
        <script>
            (function() {
                try {
                    var user = localStorage.getItem('raw-surf-user');
                    if (!user) {
                        // No user logged in - clear all God Mode related items
                        localStorage.removeItem('godModeMinimized');
                        localStorage.removeItem('godModeDesktopMinimized');
                        localStorage.removeItem('isGodMode');
                        localStorage.removeItem('isPersonaBarActive');
                        localStorage.removeItem('activePersona');
                        // Add class to body to hide any God Mode UI via CSS
                        document.documentElement.classList.add('no-god-mode');
                    }
                } catch(e) {
                    // localStorage might not be available - hide God Mode just in case
                    document.documentElement.classList.add('no-god-mode');
                }
            })();
        </script>
        <style>
            /* Hide all God Mode related UI when user is not logged in */
            .no-god-mode [data-testid*="persona-mask"],
            .no-god-mode [data-testid*="god-mode"] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
            }
        </style>
