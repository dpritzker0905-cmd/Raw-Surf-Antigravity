[build]
  base = "frontend"
  command = "yarn install --ignore-engines && CI=false yarn build"
  publish = "build"

[build.environment]
  NODE_VERSION = "18.20.2"
  NODE_OPTIONS = "--openssl-legacy-provider"
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  REACT_APP_BACKEND_URL = "https://raw-surf-antigravity.onrender.com"

# Production (main branch) - only rebuild when frontend files actually changed
[context.production]
  command = "yarn install --ignore-engines && CI=false yarn build"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- frontend/src frontend/public netlify.toml"

# Deploy previews (PRs) - always build
[context.deploy-preview]
  command = "yarn install --ignore-engines && CI=false yarn build"

# Dev branch - always build, gets stable URL at dev--rawsurf.netlify.app
[context.dev]
  command = "yarn install --ignore-engines && CI=false yarn build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
